name: Agent goal
description: Define a repository-level goal for Sepo to plan and decompose
title: "Goal: "
labels: ["agent-goal"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What larger repository objective should this issue track?
      placeholder: Describe the strategic objective.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: Why does this goal matter for the repository?
      placeholder: Explain the rationale and expected value.
    validations:
      required: true
  - type: textarea
    id: success-criteria
    attributes:
      label: Success criteria
      description: What would make this goal complete?
      placeholder: |
        - [ ] Define the observable outcome.
        - [ ] Link completion to concrete repository behavior or artifacts.
    validations:
      required: true
  - type: textarea
    id: current-strategy
    attributes:
      label: Current strategy
      description: What is the current approach or hypothesis for achieving this goal?
      placeholder: Summarize the initial approach, if known.
    validations:
      required: false
  - type: textarea
    id: subgoals
    attributes:
      label: Subgoals or child tasks
      description: What subgoals, workstreams, or child issues are known?
      placeholder: |
        - [ ] First subgoal or child task
        - [ ] Follow-up subgoal or child task
    validations:
      required: false
  - type: textarea
    id: related-work
    attributes:
      label: Related work
      description: Link related issues, pull requests, discussions, or prior decisions.
      placeholder: |
        - Issues:
        - Pull requests:
        - Discussions:
    validations:
      required: false
  - type: textarea
    id: suggested-first-sepo-action
    attributes:
      label: Suggested first Sepo action
      description: What should Sepo do first when this goal is ready for automation?
      placeholder: Run @sepo-agent /orchestrate to choose or create one bounded child issue.
    validations:
      required: false
