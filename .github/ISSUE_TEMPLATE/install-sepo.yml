name: Install Sepo into another repository
description: Ask Sepo to open an install PR for a public target repository
title: "Install Sepo into target repository"
labels: ["agent"]
body:
  - type: textarea
    id: agent-command
    attributes:
      label: Agent command
      description: Leave this line unchanged so Sepo can route the request.
      value: "@sepo-agent /install"
    validations:
      required: true
  - type: input
    id: target-repository
    attributes:
      label: Target public repository URL
      description: Paste the public GitHub repository where Sepo should open an install PR.
      placeholder: "https://github.com/owner/repo"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes for the install request
      description: Optional extra context for the install.
      placeholder: Add constraints, branch preferences, or anything the installer should know.
    validations:
      required: false
