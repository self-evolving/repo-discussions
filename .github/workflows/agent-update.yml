name: Agent / Update

on:
  schedule:
    # GitHub cron has no native every-14-days interval; run near-biweekly on
    # the 1st and 15th of each month.
    - cron: "17 9 1,15 * *"
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Source Sepo agent repository to update from"
        required: false
        default: "self-evolving/repo"
      source_ref:
        description: "Optional source Sepo agent ref; defaults to latest stable release tag"
        required: false
        default: ""
      update_skills:
        description: "Also update .skills directories"
        required: false
        type: boolean
        default: false
      update_agent_md:
        description: "Also update AGENT.md when it is agent-owned"
        required: false
        type: boolean
        default: false
      force:
        description: "Ignore an open Sepo update PR and start from the default branch"
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write
  id-token: write # required for GitHub Actions OIDC broker exchange

concurrency:
  group: agent-update-${{ github.repository }}
  cancel-in-progress: false

env:
  UPDATE_SOURCE_REPO: ${{ inputs.source_repo || 'self-evolving/repo' }}
  UPDATE_SOURCE_REF: ${{ inputs.source_ref || '' }}
  DEFAULT_UPDATE_SOURCE_REF: main
  UPDATE_SKILLS: ${{ inputs.update_skills && 'true' || 'false' }}
  UPDATE_AGENT_MD: ${{ inputs.update_agent_md && 'true' || 'false' }}
  UPDATE_BRANCH_PREFIX: agent/update-agent-infra-

jobs:
  gate:
    if: vars.AGENT_ENABLED != 'false'
    runs-on: ${{ fromJson(vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    outputs:
      skip: ${{ steps.result.outputs.skip }}
      reason: ${{ steps.result.outputs.reason }}
      existing_pr_url: ${{ steps.pending.outputs.pr_url }}
      existing_pr_number: ${{ steps.pending.outputs.pr_number }}
      existing_pr_branch: ${{ steps.pending.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ github.token }}

      - name: Resolve scheduled activity gate
        id: schedule
        uses: ./.github/actions/scheduled-activity-gate
        with:
          github_token: ${{ github.token }}
          schedule_policy: ${{ vars.AGENT_AUTO_UPDATE == 'false' && '{"workflow_overrides":{"agent-update.yml":"disabled"}}' || vars.AGENT_SCHEDULE_POLICY || '' }}
          workflow: agent-update.yml

      - name: Check pending update PR
        id: pending
        if: steps.schedule.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          IGNORE_EXISTING_UPDATE_PR: ${{ inputs.force && 'true' || 'false' }}
          UPDATE_BRANCH_PREFIX: ${{ env.UPDATE_BRANCH_PREFIX }}
        run: bash .agent/scripts/resolve-pending-update-pr.sh

      - name: Resolve gate result
        id: result
        env:
          SCHEDULE_REASON: ${{ steps.schedule.outputs.reason }}
          SCHEDULE_SKIP: ${{ steps.schedule.outputs.skip }}
        run: |
          set -euo pipefail
          write_output() {
            local name="$1"
            local value="$2"
            local delim="DELIM_${RANDOM}_${RANDOM}_$$"
            {
              printf '%s<<%s\n' "$name" "$delim"
              printf '%s\n' "$value"
              printf '%s\n' "$delim"
            } >> "$GITHUB_OUTPUT"
          }

          if [ "${SCHEDULE_SKIP}" = "true" ]; then
            write_output "skip" "true"
            write_output "reason" "${SCHEDULE_REASON}"
          else
            write_output "skip" "false"
            write_output "reason" "${SCHEDULE_REASON}"
          fi

      - name: Write skipped summary
        if: steps.result.outputs.skip == 'true'
        env:
          EXISTING_PR_URL: ${{ steps.pending.outputs.pr_url }}
          REASON: ${{ steps.result.outputs.reason }}
        run: |
          set -euo pipefail
          if [ -n "${EXISTING_PR_URL}" ]; then
            printf '%s\n' "Skipped Sepo update check: ${REASON} (${EXISTING_PR_URL})." >> "$GITHUB_STEP_SUMMARY"
          else
            printf '%s\n' "Skipped Sepo update check: ${REASON}." >> "$GITHUB_STEP_SUMMARY"
          fi

  update:
    needs: gate
    if: vars.AGENT_ENABLED != 'false' && needs.gate.outputs.skip != 'true'
    runs-on: ${{ fromJson(vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false
          token: ${{ github.token }}

      - name: Resolve update target checkout
        id: update_target
        env:
          EXISTING_PR_BRANCH: ${{ needs.gate.outputs.existing_pr_branch }}
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_WORKTREE: ${{ runner.temp }}/agent-update-target
        run: |
          set -euo pipefail
          write_output() {
            local name="$1"
            local value="$2"
            local delim="DELIM_${RANDOM}_${RANDOM}_$$"
            {
              printf '%s<<%s\n' "$name" "$delim"
              printf '%s\n' "$value"
              printf '%s\n' "$delim"
            } >> "$GITHUB_OUTPUT"
          }

          if [ -n "${EXISTING_PR_BRANCH}" ]; then
            auth_header="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 | tr -d '\n')"
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
              fetch --no-tags origin "refs/heads/${EXISTING_PR_BRANCH}:refs/remotes/origin/${EXISTING_PR_BRANCH}"
            git worktree add -B "${EXISTING_PR_BRANCH}" "${TARGET_WORKTREE}" "origin/${EXISTING_PR_BRANCH}"
            write_output "path" "${TARGET_WORKTREE}"
            write_output "mode" "existing-pr-worktree"
          else
            write_output "path" "${GITHUB_WORKSPACE}"
            write_output "mode" "runtime-checkout"
          fi

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Resolve update provider
        id: provider
        uses: ./.github/actions/resolve-agent-provider
        with:
          route: skill
          default_provider: ${{ vars.AGENT_DEFAULT_PROVIDER || 'auto' }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model_policy: ${{ vars.AGENT_MODEL_POLICY || '' }}

      - name: Setup agent runtime
        uses: ./.github/actions/setup-agent-runtime
        with:
          install_codex: ${{ steps.provider.outputs.install_codex }}
          install_claude: ${{ steps.provider.outputs.install_claude }}

      - name: Resolve update source
        id: update_source
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          UPDATE_SOURCE_REPO: ${{ env.UPDATE_SOURCE_REPO }}
          UPDATE_SOURCE_REF: ${{ env.UPDATE_SOURCE_REF }}
          DEFAULT_UPDATE_SOURCE_REF: ${{ env.DEFAULT_UPDATE_SOURCE_REF }}
        run: bash .agent/scripts/resolve-update-source.sh

      - name: Write update source summary
        env:
          SOURCE_KIND: ${{ steps.update_source.outputs.source_kind }}
          SOURCE_REASON: ${{ steps.update_source.outputs.reason }}
          SOURCE_REF: ${{ steps.update_source.outputs.source_ref }}
          SOURCE_REPO: ${{ steps.update_source.outputs.source_repo }}
          SOURCE_SHA: ${{ steps.update_source.outputs.source_sha }}
        run: |
          set -euo pipefail
          printf '%s\n' "Sepo update source: ${SOURCE_REPO}@${SOURCE_REF} (${SOURCE_SHA}; ${SOURCE_KIND})." >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${SOURCE_REASON}" ]; then
            printf '%s\n' "${SOURCE_REASON}." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Resolve task timeout
        id: task_timeout
        env:
          AGENT_TASK_TIMEOUT_POLICY: ${{ vars.AGENT_TASK_TIMEOUT_POLICY || '' }}
          ROUTE: skill
        run: node .agent/dist/cli/resolve-task-timeout.js

      - name: Run update agent
        id: agent
        timeout-minutes: ${{ fromJson(steps.task_timeout.outputs.minutes || '30') }}
        uses: ./.github/actions/run-agent-task
        with:
          agent: ${{ steps.provider.outputs.provider }}
          github_token: ${{ steps.auth.outputs.token }}
          secondary_github_token: ${{ secrets.AGENT_SECONDARY_GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: ${{ steps.provider.outputs.model }}
          display_model: ${{ vars.AGENT_DISPLAY_MODEL || '' }}
          reasoning_effort: ${{ steps.provider.outputs.reasoning_effort || 'xhigh' }}
          permission_mode: approve-all
          skill: update-agent
          route: skill
          lane: scheduled-update
          memory_mode_override: read-only
          memory_ref: ${{ vars.AGENT_MEMORY_REF || 'agent/memory' }}
          memory_policy: ${{ vars.AGENT_MEMORY_POLICY || '' }}
          rubrics_ref: ${{ vars.AGENT_RUBRICS_REF || 'agent/rubrics' }}
          rubrics_policy: ${{ vars.AGENT_RUBRICS_POLICY || '' }}
          rubrics_limit: ${{ vars.AGENT_RUBRICS_LIMIT || '10' }}
          session_policy: track-only
          request_text: |
            Run a Sepo agent infrastructure update check for this repository.

            Confirmed inputs:
            - target repository: ${{ github.repository }}
            - target default branch: ${{ github.event.repository.default_branch }}
            - runtime checkout path: ${{ github.workspace }}
            - update target path: ${{ steps.update_target.outputs.path }}
            - update target mode: ${{ steps.update_target.outputs.mode }}
            - source agent repo/ref: ${{ steps.update_source.outputs.source_repo }}@${{ steps.update_source.outputs.source_ref }}
            - source agent SHA: ${{ steps.update_source.outputs.source_sha }}
            - source resolution: ${{ steps.update_source.outputs.source_kind }}
            - existing update PR number: ${{ needs.gate.outputs.existing_pr_number || 'none' }}
            - existing update PR branch: ${{ needs.gate.outputs.existing_pr_branch || 'none' }}
            - update branch: use `${{ env.UPDATE_BRANCH_PREFIX }}<yyyymmdd>`
            - update .skills directories: ${{ env.UPDATE_SKILLS }}
            - update AGENT.md when agent-owned: ${{ env.UPDATE_AGENT_MD }}
            - remove obsolete or legacy files: false
            - post-merge workflows: document only

            Runtime actions and scripts are loaded from the default-branch checkout
            at the runtime checkout path. If an existing update PR number and branch
            are not `none`, update that branch and PR in the update target path
            instead of opening a new PR; do not check out the existing PR branch in
            the runtime checkout path. Otherwise, open a pull request only when the
            update produces changes. If the target is already current, leave no PR
            and report that no update was needed.
            When a PR is opened, title and summarize it as:
            `Update Sepo from <installed version/ref> to ${{ steps.update_source.outputs.source_ref }}/${{ steps.update_source.outputs.source_sha }}`.
          requested_by: ${{ github.actor }}
          source_kind: workflow_dispatch
          target_kind: repository
          target_number: "0"
          target_url: ${{ github.server_url }}/${{ github.repository }}
          workflow: agent-update.yml

      - name: Write update summary
        if: always() && steps.agent.outputs.response_file != ''
        env:
          BODY_FILE: ${{ steps.agent.outputs.response_file }}
        run: |
          if [ -f "$BODY_FILE" ]; then
            cat "$BODY_FILE" >> "$GITHUB_STEP_SUMMARY"
          fi
