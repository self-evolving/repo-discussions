name: Agent Router

# Shared portal + routing workflow.
#
# This repo contains both the reusable workflows and the agent runtime. Template
# users are expected to duplicate the repository, then let setup-agent-runtime
# install dependencies and build the local runtime in place before agent steps
# run.
#
# Local usage (same repo):
#
#   jobs:
#     agent:
#       uses: ./.github/workflows/agent-router.yml
#       with:
#         runs_on: ${{ vars.AGENT_RUNS_ON || '["ubuntu-latest"]' }}
#       secrets: inherit

on:
  workflow_call:
    outputs:
      should_respond:
        description: "Whether the portal accepted the trigger and handled routing"
        value: ${{ jobs.portal.outputs.should_respond }}
    inputs:
      runs_on:
        description: "Runner labels as JSON array (defaults to repository variable AGENT_RUNS_ON or '[\"ubuntu-latest\"]')"
        type: string
        required: false
        default: ""
      agent_handle:
        description: "Mention handle for the agent (e.g. '@myorg/agent')"
        type: string
        default: "@sepo-agent"
      default_agent:
        description: "Default acpx agent provider (auto, codex, claude)"
        type: string
        default: auto
      session_bundle_mode:
        description: "Session bundle persistence mode for agent runs (defaults to repository variable AGENT_SESSION_BUNDLE_MODE or 'auto')"
        type: string
        default: ""
      skill_root:
        description: "Root directory for user-defined skills"
        type: string
        default: ".skills"
      trigger_kind:
        description: "Trigger surface mode (mention or label)"
        type: string
        default: mention
      label_name:
        description: "Raw triggering label when trigger_kind=label"
        type: string
        default: ""
      author_association:
        description: "Optional trusted association override"
        type: string
        default: ""
      access_policy:
        description: "Optional JSON access policy for trigger and route authorization"
        type: string
        default: ""
      automation_mode:
        description: "Post-action orchestration mode (disabled, heuristics, agent)"
        type: string
        default: "agent"
      automation_max_rounds:
        description: "Maximum automation handoff rounds"
        type: string
        default: "12"
    secrets:
      AGENT_APP_ID:
        description: "GitHub App ID for elevated token"
        required: false
      AGENT_APP_PRIVATE_KEY:
        description: "GitHub App private key"
        required: false
      AGENT_PAT:
        description: "Fine-grained PAT or machine-user token"
        required: false
      AGENT_INSTALL_PAT:
        description: "Install-route machine-user token for external install PRs"
        required: false
      AGENT_SECONDARY_GITHUB_TOKEN:
        description: "Optional read-only secondary token for external repo context"
        required: false
      OPENAI_API_KEY:
        description: "OpenAI API key for Codex agent"
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        description: "Claude Code OAuth token"
        required: false
      ANTHROPIC_API_KEY:
        description: "Anthropic API key for Claude Code"
        required: false

permissions:
  actions: write
  contents: write
  discussions: write
  issues: write
  pull-requests: write
  id-token: write # required for GitHub Actions OIDC broker exchange
  # Note: workflow-level permissions are the union of all jobs. Individual
  # agent invocations use route-specific acpx permission modes, with
  # dispatch triage, explicit implement metadata generation, answer,
  # implement, and fix-pr all currently using approve-all.

jobs:
  # --- Portal: extract context, triage, resolve route ---
  portal:
    if: vars.AGENT_ENABLED != 'false'
    runs-on: ${{ fromJson(inputs.runs_on || vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    outputs:
      should_respond: ${{ steps.context.outputs.should_respond }}
      association: ${{ steps.context.outputs.association }}
      body: ${{ steps.context.outputs.body }}
      source_kind: ${{ steps.context.outputs.source_kind }}
      target_kind: ${{ steps.context.outputs.target_kind }}
      target_number: ${{ steps.context.outputs.target_number }}
      target_url: ${{ steps.context.outputs.target_url }}
      reaction_subject_id: ${{ steps.context.outputs.reaction_subject_id }}
      response_kind: ${{ steps.context.outputs.response_kind }}
      source_comment_id: ${{ steps.context.outputs.source_comment_id }}
      source_comment_url: ${{ steps.context.outputs.source_comment_url }}
      review_comment_id: ${{ steps.context.outputs.review_comment_id }}
      discussion_node_id: ${{ steps.context.outputs.discussion_node_id }}
      reply_to_id: ${{ steps.context.outputs.reply_to_id }}
      requested_by: ${{ steps.context.outputs.requested_by }}
      requested_route: ${{ steps.context.outputs.requested_route }}
      requested_skill: ${{ steps.context.outputs.requested_skill }}
      route: ${{ steps.dispatch.outputs.route }}
      needs_approval: ${{ steps.dispatch.outputs.needs_approval }}
      confidence: ${{ steps.dispatch.outputs.confidence }}
      summary: ${{ steps.dispatch.outputs.summary }}
      issue_title: ${{ steps.dispatch.outputs.issue_title }}
      issue_body: ${{ steps.dispatch.outputs.issue_body }}
      skill: ${{ steps.dispatch.outputs.skill }}
      base_pr: ${{ steps.dispatch.outputs.base_pr }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Resolve dispatch provider
        id: provider
        uses: ./.github/actions/resolve-agent-provider
        with:
          route: dispatch
          default_provider: ${{ vars.AGENT_DEFAULT_PROVIDER || inputs.default_agent || 'auto' }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model_policy: ${{ vars.AGENT_MODEL_POLICY || '' }}
          required: "false"

      - name: Setup agent runtime
        id: runtime
        uses: ./.github/actions/setup-agent-runtime
        with:
          install_codex: ${{ steps.provider.outputs.install_codex }}
          install_claude: ${{ steps.provider.outputs.install_claude }}

      - name: Extract context
        id: context
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          INPUT_MENTION: ${{ inputs.agent_handle }}
          INPUT_TRIGGER_KIND: ${{ inputs.trigger_kind }}
          INPUT_LABEL_NAME: ${{ inputs.label_name }}
          INPUT_AUTHOR_ASSOCIATION: ${{ inputs.author_association }}
        run: node .agent/dist/cli/extract-context.js

      - name: React with eyes
        if: steps.context.outputs.should_respond == 'true'
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          REACTION_SUBJECT_ID: ${{ steps.context.outputs.reaction_subject_id }}
          REACTION_CONTENT: EYES
        run: node .agent/dist/cli/add-reaction.js

      - name: Resolve explicit route authorization
        if: >-
          steps.context.outputs.should_respond == 'true' &&
          steps.context.outputs.requested_route == 'implement' &&
          steps.context.outputs.target_kind != 'issue'
        id: explicit_dispatch
        env:
          REQUESTED_ROUTE: ${{ steps.context.outputs.requested_route }}
          REQUESTED_SKILL: ${{ steps.context.outputs.requested_skill }}
          REQUEST_TEXT: ${{ steps.context.outputs.body }}
          TARGET_KIND: ${{ steps.context.outputs.target_kind }}
          AUTHOR_ASSOCIATION: ${{ steps.context.outputs.association }}
          ACCESS_POLICY: ${{ inputs.access_policy }}
          REPOSITORY_PRIVATE: ${{ github.event.repository.private && 'true' || 'false' }}
        run: node .agent/dist/cli/resolve-dispatch.js

      - name: Require dispatch provider
        id: dispatch_provider
        if: >-
          steps.context.outputs.should_respond == 'true' &&
          steps.context.outputs.requested_route == ''
        uses: ./.github/actions/resolve-agent-provider
        with:
          route: dispatch
          default_provider: ${{ vars.AGENT_DEFAULT_PROVIDER || inputs.default_agent || 'auto' }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model_policy: ${{ vars.AGENT_MODEL_POLICY || '' }}

      - name: Resolve task timeout
        if: >-
          steps.context.outputs.should_respond == 'true' &&
          (
            steps.context.outputs.requested_route == '' ||
            (
              steps.explicit_dispatch.outputs.route == 'implement' &&
              steps.context.outputs.target_kind != 'issue' &&
              steps.provider.outputs.provider != ''
            )
          )
        id: task_timeout
        env:
          AGENT_TASK_TIMEOUT_POLICY: ${{ vars.AGENT_TASK_TIMEOUT_POLICY || '' }}
          ROUTE: dispatch
        run: node .agent/dist/cli/resolve-task-timeout.js

      - name: Run dispatch triage
        if: >-
          steps.context.outputs.should_respond == 'true' &&
          steps.context.outputs.requested_route == ''
        id: triage
        timeout-minutes: ${{ fromJson(steps.task_timeout.outputs.minutes || '30') }}
        uses: ./.github/actions/run-agent-task
        with:
          agent: ${{ steps.dispatch_provider.outputs.provider }}
          github_token: ${{ steps.auth.outputs.token }}
          secondary_github_token: ${{ secrets.AGENT_SECONDARY_GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: ${{ steps.dispatch_provider.outputs.model }}
          display_model: ${{ vars.AGENT_DISPLAY_MODEL || '' }}
          permission_mode: approve-all
          prompt: dispatch
          route: dispatch
          memory_ref: ${{ vars.AGENT_MEMORY_REF || 'agent/memory' }}
          memory_policy: ${{ vars.AGENT_MEMORY_POLICY || '' }}
          session_bundle_mode: ${{ inputs.session_bundle_mode || vars.AGENT_SESSION_BUNDLE_MODE || 'auto' }}
          session_policy: none
          request_text: ${{ steps.context.outputs.body }}
          requested_by: ${{ steps.context.outputs.requested_by }}
          source_kind: ${{ steps.context.outputs.source_kind }}
          target_kind: ${{ steps.context.outputs.target_kind }}
          target_number: ${{ steps.context.outputs.target_number }}
          target_url: ${{ steps.context.outputs.target_url }}
          reasoning_effort: ${{ steps.dispatch_provider.outputs.reasoning_effort || 'medium' }}
          workflow: agent-router.yml

      - name: Generate implement issue metadata
        if: >-
          steps.context.outputs.should_respond == 'true' &&
          steps.explicit_dispatch.outputs.route == 'implement' &&
          steps.context.outputs.target_kind != 'issue' &&
          steps.provider.outputs.provider != ''
        id: implement_metadata
        continue-on-error: true
        timeout-minutes: ${{ fromJson(steps.task_timeout.outputs.minutes || '30') }}
        uses: ./.github/actions/run-agent-task
        with:
          agent: ${{ steps.provider.outputs.provider }}
          github_token: ${{ steps.auth.outputs.token }}
          secondary_github_token: ${{ secrets.AGENT_SECONDARY_GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: ${{ steps.provider.outputs.model }}
          display_model: ${{ vars.AGENT_DISPLAY_MODEL || '' }}
          permission_mode: approve-all
          prompt: agent-implement-metadata
          route: dispatch
          memory_ref: ${{ vars.AGENT_MEMORY_REF || 'agent/memory' }}
          memory_policy: ${{ vars.AGENT_MEMORY_POLICY || '' }}
          session_bundle_mode: ${{ inputs.session_bundle_mode || vars.AGENT_SESSION_BUNDLE_MODE || 'auto' }}
          session_policy: none
          request_text: ${{ steps.context.outputs.body }}
          requested_by: ${{ steps.context.outputs.requested_by }}
          source_kind: ${{ steps.context.outputs.source_kind }}
          target_kind: ${{ steps.context.outputs.target_kind }}
          target_number: ${{ steps.context.outputs.target_number }}
          target_url: ${{ steps.context.outputs.target_url }}
          reasoning_effort: ${{ steps.provider.outputs.reasoning_effort || 'medium' }}
          workflow: agent-router.yml

      - name: Resolve route
        if: steps.context.outputs.should_respond == 'true'
        id: dispatch
        env:
          RESPONSE_FILE: ${{ steps.triage.outputs.response_file || steps.implement_metadata.outputs.response_file }}
          REQUESTED_ROUTE: ${{ steps.context.outputs.requested_route }}
          REQUESTED_SKILL: ${{ steps.context.outputs.requested_skill }}
          REQUEST_TEXT: ${{ steps.context.outputs.body }}
          TARGET_KIND: ${{ steps.context.outputs.target_kind }}
          TARGET_NUMBER: ${{ steps.context.outputs.target_number }}
          AUTHOR_ASSOCIATION: ${{ steps.context.outputs.association }}
          ACCESS_POLICY: ${{ inputs.access_policy }}
          REPOSITORY_PRIVATE: ${{ github.event.repository.private && 'true' || 'false' }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .agent/dist/cli/resolve-dispatch.js

      - name: Label handled issue or PR
        if: >-
          steps.context.outputs.should_respond == 'true' &&
          vars.AGENT_STATUS_LABEL_ENABLED == 'true' &&
          steps.dispatch.outputs.route != '' &&
          steps.dispatch.outputs.route != 'unsupported' &&
          (steps.context.outputs.target_kind == 'issue' || steps.context.outputs.target_kind == 'pull_request')
        continue-on-error: true
        env:
          AGENT_STATUS_LABEL_ENABLED: ${{ vars.AGENT_STATUS_LABEL_ENABLED || '' }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_KIND: ${{ steps.context.outputs.target_kind }}
          TARGET_NUMBER: ${{ steps.context.outputs.target_number }}
        run: node .agent/dist/cli/add-label.js

      - name: React with thumbs up (dispatch acknowledgment)
        if: >-
          steps.context.outputs.should_respond == 'true' &&
          (steps.dispatch.outputs.route == 'review' || steps.dispatch.outputs.route == 'fix-pr' || steps.dispatch.outputs.route == 'orchestrate') &&
          github.event.action != 'edited'
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          REACTION_SUBJECT_ID: ${{ steps.context.outputs.reaction_subject_id }}
          REACTION_CONTENT: THUMBS_UP
        run: node .agent/dist/cli/add-reaction.js

  # --- Route: answer (inline response) ---
  answer:
    needs: portal
    if: >-
      vars.AGENT_ENABLED != 'false' &&
      needs.portal.outputs.should_respond == 'true' &&
      (needs.portal.outputs.route == 'answer' || needs.portal.outputs.route == 'unsupported')
    runs-on: ${{ fromJson(inputs.runs_on || vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Resolve answer provider
        id: provider
        if: needs.portal.outputs.route == 'answer'
        uses: ./.github/actions/resolve-agent-provider
        with:
          route: answer
          default_provider: ${{ vars.AGENT_DEFAULT_PROVIDER || inputs.default_agent || 'auto' }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model_policy: ${{ vars.AGENT_MODEL_POLICY || '' }}

      - name: Setup agent runtime
        id: runtime
        if: >-
          needs.portal.outputs.route == 'answer' ||
          needs.portal.outputs.route == 'unsupported'
        uses: ./.github/actions/setup-agent-runtime
        with:
          install_codex: ${{ needs.portal.outputs.route == 'answer' && steps.provider.outputs.install_codex || 'false' }}
          install_claude: ${{ needs.portal.outputs.route == 'answer' && steps.provider.outputs.install_claude || 'false' }}

      - name: Resolve task timeout
        if: needs.portal.outputs.route == 'answer'
        id: task_timeout
        env:
          AGENT_TASK_TIMEOUT_POLICY: ${{ vars.AGENT_TASK_TIMEOUT_POLICY || '' }}
          ROUTE: answer
        run: node .agent/dist/cli/resolve-task-timeout.js

      - name: Run answer agent
        if: needs.portal.outputs.route == 'answer'
        id: answer
        timeout-minutes: ${{ fromJson(steps.task_timeout.outputs.minutes || '30') }}
        uses: ./.github/actions/run-agent-task
        with:
          agent: ${{ steps.provider.outputs.provider }}
          github_token: ${{ steps.auth.outputs.token }}
          secondary_github_token: ${{ secrets.AGENT_SECONDARY_GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: ${{ steps.provider.outputs.model }}
          display_model: ${{ vars.AGENT_DISPLAY_MODEL || '' }}
          permission_mode: approve-all
          prompt: answer
          route: answer
          memory_ref: ${{ vars.AGENT_MEMORY_REF || 'agent/memory' }}
          memory_policy: ${{ vars.AGENT_MEMORY_POLICY || '' }}
          session_bundle_mode: ${{ inputs.session_bundle_mode || vars.AGENT_SESSION_BUNDLE_MODE || 'auto' }}
          session_policy: resume-best-effort
          request_text: ${{ needs.portal.outputs.body }}
          requested_by: ${{ needs.portal.outputs.requested_by }}
          source_kind: ${{ needs.portal.outputs.source_kind }}
          target_kind: ${{ needs.portal.outputs.target_kind }}
          target_number: ${{ needs.portal.outputs.target_number }}
          target_url: ${{ needs.portal.outputs.target_url }}
          reasoning_effort: ${{ steps.provider.outputs.reasoning_effort || 'high' }}
          workflow: agent-router.yml

      - name: Prepare unsupported response
        if: needs.portal.outputs.route == 'unsupported'
        env:
          BODY_FILE: ${{ runner.temp }}/unsupported.md
          SUMMARY: ${{ needs.portal.outputs.summary }}
        run: printf '%s\n' "${SUMMARY}" > "${BODY_FILE}"

      - name: Post answer
        if: needs.portal.outputs.route == 'answer'
        env:
          BODY_FILE: ${{ steps.answer.outputs.response_file }}
          MODEL_DISPLAY: ${{ steps.answer.outputs.model_display }}
          DISCUSSION_ID: ${{ needs.portal.outputs.discussion_node_id }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REPLY_TO_ID: ${{ needs.portal.outputs.reply_to_id }}
          RESPONSE_KIND: ${{ needs.portal.outputs.response_kind }}
          RESUME_STATUS: ${{ steps.answer.outputs.resume_status }}
          REVIEW_COMMENT_ID: ${{ needs.portal.outputs.review_comment_id }}
          TARGET_NUMBER: ${{ needs.portal.outputs.target_number }}
        run: node .agent/dist/cli/post-response.js

      - name: Post unsupported response
        if: needs.portal.outputs.route == 'unsupported'
        env:
          BODY_FILE: ${{ runner.temp }}/unsupported.md
          DISCUSSION_ID: ${{ needs.portal.outputs.discussion_node_id }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REPLY_TO_ID: ${{ needs.portal.outputs.reply_to_id }}
          RESPONSE_KIND: ${{ needs.portal.outputs.response_kind }}
          REVIEW_COMMENT_ID: ${{ needs.portal.outputs.review_comment_id }}
          TARGET_NUMBER: ${{ needs.portal.outputs.target_number }}
        run: node .agent/dist/cli/post-response.js

  # --- Route: skill (inline response via <skill_root>/<name>/SKILL.md) ---
  skill:
    needs: portal
    if: >-
      vars.AGENT_ENABLED != 'false' &&
      needs.portal.outputs.should_respond == 'true' &&
      needs.portal.outputs.route == 'skill'
    runs-on: ${{ fromJson(inputs.runs_on || vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Resolve skill provider
        id: provider
        uses: ./.github/actions/resolve-agent-provider
        with:
          route: skill
          default_provider: ${{ vars.AGENT_DEFAULT_PROVIDER || inputs.default_agent || 'auto' }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model_policy: ${{ vars.AGENT_MODEL_POLICY || '' }}
          required: "false"

      - name: Setup agent runtime
        id: runtime
        uses: ./.github/actions/setup-agent-runtime
        with:
          install_codex: ${{ steps.provider.outputs.install_codex }}
          install_claude: ${{ steps.provider.outputs.install_claude }}

      - name: Check skill
        id: skill_check
        uses: ./.github/actions/run-skill-setup
        with:
          skill: ${{ needs.portal.outputs.skill }}
          skill_root: ${{ inputs.skill_root }}
          trusted_ref: ${{ !startsWith(github.ref, 'refs/pull/') }}
          run_setup: "false"

      - name: Post missing-skill comment
        if: steps.skill_check.outputs.exists == 'false'
        env:
          BODY_FILE: ${{ runner.temp }}/missing-skill.md
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_NUMBER: ${{ needs.portal.outputs.target_number }}
          RESPONSE_KIND: ${{ needs.portal.outputs.response_kind }}
          REVIEW_COMMENT_ID: ${{ needs.portal.outputs.review_comment_id }}
          DISCUSSION_ID: ${{ needs.portal.outputs.discussion_node_id }}
          REPLY_TO_ID: ${{ needs.portal.outputs.reply_to_id }}
          REQUESTED_SKILL: ${{ needs.portal.outputs.skill }}
          SKILL_PATH: ${{ steps.skill_check.outputs.skill_path }}
        run: |
          printf '%s\n' \
            "Skill \`${SKILL_PATH}\` was not found in this repository." \
            > "$BODY_FILE"
          node .agent/dist/cli/post-response.js

      - name: Require skill provider
        id: skill_provider
        if: steps.skill_check.outputs.exists == 'true'
        uses: ./.github/actions/resolve-agent-provider
        with:
          route: skill
          default_provider: ${{ vars.AGENT_DEFAULT_PROVIDER || inputs.default_agent || 'auto' }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model_policy: ${{ vars.AGENT_MODEL_POLICY || '' }}

      - name: Run skill setup
        id: skill_setup
        if: steps.skill_check.outputs.exists == 'true'
        continue-on-error: true
        uses: ./.github/actions/run-skill-setup
        with:
          skill: ${{ needs.portal.outputs.skill }}
          skill_root: ${{ inputs.skill_root }}
          trusted_ref: ${{ !startsWith(github.ref, 'refs/pull/') }}
          run_setup: "true"

      - name: Post skill setup failure
        if: steps.skill_setup.outcome == 'failure'
        env:
          BODY_FILE: ${{ runner.temp }}/skill-setup-failed.md
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_NUMBER: ${{ needs.portal.outputs.target_number }}
          RESPONSE_KIND: ${{ needs.portal.outputs.response_kind }}
          REVIEW_COMMENT_ID: ${{ needs.portal.outputs.review_comment_id }}
          DISCUSSION_ID: ${{ needs.portal.outputs.discussion_node_id }}
          REPLY_TO_ID: ${{ needs.portal.outputs.reply_to_id }}
          REQUESTED_SKILL: ${{ needs.portal.outputs.skill }}
          SETUP_PATH: ${{ steps.skill_setup.outputs.setup_path }}
        run: |
          if [ -n "${SETUP_PATH}" ]; then
            printf '%s\n' \
              "Skill setup failed for \`${REQUESTED_SKILL}\` using \`${SETUP_PATH}\`. Check the workflow logs for the failed setup step." \
              > "$BODY_FILE"
          else
            printf '%s\n' \
              "Skill setup failed for \`${REQUESTED_SKILL}\`. Check the workflow logs for the failed setup step." \
              > "$BODY_FILE"
          fi
          node .agent/dist/cli/post-response.js

      - name: Resolve task timeout
        if: steps.skill_check.outputs.exists == 'true' && steps.skill_setup.outcome == 'success'
        id: task_timeout
        env:
          AGENT_TASK_TIMEOUT_POLICY: ${{ vars.AGENT_TASK_TIMEOUT_POLICY || '' }}
          ROUTE: skill
        run: node .agent/dist/cli/resolve-task-timeout.js

      - name: Run skill
        id: skill
        if: steps.skill_check.outputs.exists == 'true' && steps.skill_setup.outcome == 'success'
        timeout-minutes: ${{ fromJson(steps.task_timeout.outputs.minutes || '30') }}
        uses: ./.github/actions/run-agent-task
        with:
          agent: ${{ steps.skill_provider.outputs.provider }}
          github_token: ${{ steps.auth.outputs.token }}
          secondary_github_token: ${{ secrets.AGENT_SECONDARY_GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: ${{ steps.skill_provider.outputs.model }}
          display_model: ${{ vars.AGENT_DISPLAY_MODEL || '' }}
          permission_mode: approve-all
          skill: ${{ needs.portal.outputs.skill }}
          skill_root: ${{ inputs.skill_root }}
          route: skill
          memory_ref: ${{ vars.AGENT_MEMORY_REF || 'agent/memory' }}
          memory_policy: ${{ vars.AGENT_MEMORY_POLICY || '' }}
          session_bundle_mode: ${{ inputs.session_bundle_mode || vars.AGENT_SESSION_BUNDLE_MODE || 'auto' }}
          session_policy: none
          request_text: ${{ needs.portal.outputs.body }}
          requested_by: ${{ needs.portal.outputs.requested_by }}
          source_kind: ${{ needs.portal.outputs.source_kind }}
          target_kind: ${{ needs.portal.outputs.target_kind }}
          target_number: ${{ needs.portal.outputs.target_number }}
          target_url: ${{ needs.portal.outputs.target_url }}
          reasoning_effort: ${{ steps.skill_provider.outputs.reasoning_effort || 'high' }}
          workflow: agent-router.yml

      - name: Post skill response
        if: steps.skill_check.outputs.exists == 'true' && steps.skill_setup.outcome == 'success' && steps.skill.outcome == 'success'
        env:
          BODY_FILE: ${{ steps.skill.outputs.response_file }}
          MODEL_DISPLAY: ${{ steps.skill.outputs.model_display }}
          DISCUSSION_ID: ${{ needs.portal.outputs.discussion_node_id }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REPLY_TO_ID: ${{ needs.portal.outputs.reply_to_id }}
          RESPONSE_KIND: ${{ needs.portal.outputs.response_kind }}
          REVIEW_COMMENT_ID: ${{ needs.portal.outputs.review_comment_id }}
          TARGET_NUMBER: ${{ needs.portal.outputs.target_number }}
        run: node .agent/dist/cli/post-response.js

  # --- Route: install (dedicated prompt with install-only token) ---
  install:
    needs: portal
    if: >-
      vars.AGENT_ENABLED != 'false' &&
      needs.portal.outputs.should_respond == 'true' &&
      needs.portal.outputs.route == 'install'
    runs-on: ${{ fromJson(inputs.runs_on || vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    env:
      AGENT_INSTALL_PAT_CONFIGURED: ${{ secrets.AGENT_INSTALL_PAT != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
          token: ${{ github.token }}

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Resolve install provider
        id: provider
        if: env.AGENT_INSTALL_PAT_CONFIGURED == 'true'
        uses: ./.github/actions/resolve-agent-provider
        with:
          route: install
          default_provider: ${{ vars.AGENT_DEFAULT_PROVIDER || inputs.default_agent || 'auto' }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model_policy: ${{ vars.AGENT_MODEL_POLICY || '' }}

      - name: Setup agent runtime
        id: runtime
        uses: ./.github/actions/setup-agent-runtime
        with:
          install_codex: ${{ steps.provider.outputs.install_codex }}
          install_claude: ${{ steps.provider.outputs.install_claude }}

      - name: Post install configuration blocked response
        if: env.AGENT_INSTALL_PAT_CONFIGURED != 'true'
        env:
          BODY_FILE: ${{ runner.temp }}/install-not-configured.md
          DISCUSSION_ID: ${{ needs.portal.outputs.discussion_node_id }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REPLY_TO_ID: ${{ needs.portal.outputs.reply_to_id }}
          RESPONSE_KIND: ${{ needs.portal.outputs.response_kind }}
          REVIEW_COMMENT_ID: ${{ needs.portal.outputs.review_comment_id }}
          TARGET_NUMBER: ${{ needs.portal.outputs.target_number }}
        run: |
          printf '%s\n' \
            "Install is not configured." \
            "" \
            "Required secret: \`AGENT_INSTALL_PAT\`." \
            "Next step: configure it with a machine-user token that can push or open the install PR, then rerun \`@sepo-agent /install\` with the target request." \
            > "$BODY_FILE"
          node .agent/dist/cli/post-response.js

      - name: Resolve task timeout
        if: env.AGENT_INSTALL_PAT_CONFIGURED == 'true'
        id: task_timeout
        env:
          AGENT_TASK_TIMEOUT_POLICY: ${{ vars.AGENT_TASK_TIMEOUT_POLICY || '' }}
          ROUTE: install
        run: node .agent/dist/cli/resolve-task-timeout.js

      - name: Run install
        id: install
        if: env.AGENT_INSTALL_PAT_CONFIGURED == 'true'
        timeout-minutes: ${{ fromJson(steps.task_timeout.outputs.minutes || '30') }}
        uses: ./.github/actions/run-agent-task
        with:
          agent: ${{ steps.provider.outputs.provider }}
          github_token: ${{ secrets.AGENT_INSTALL_PAT }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: ${{ steps.provider.outputs.model }}
          display_model: ${{ vars.AGENT_DISPLAY_MODEL || '' }}
          permission_mode: approve-all
          prompt: agent-install
          route: install
          memory_ref: ${{ vars.AGENT_MEMORY_REF || 'agent/memory' }}
          memory_mode_override: disabled
          rubrics_mode_override: disabled
          session_bundle_mode: ${{ inputs.session_bundle_mode || vars.AGENT_SESSION_BUNDLE_MODE || 'auto' }}
          session_policy: none
          request_text: ${{ needs.portal.outputs.body }}
          requested_by: ${{ needs.portal.outputs.requested_by }}
          source_kind: ${{ needs.portal.outputs.source_kind }}
          target_kind: ${{ needs.portal.outputs.target_kind }}
          target_number: ${{ needs.portal.outputs.target_number }}
          target_url: ${{ needs.portal.outputs.target_url }}
          reasoning_effort: ${{ steps.provider.outputs.reasoning_effort || 'high' }}
          workflow: agent-router.yml

      - name: Post install response
        id: post_install_response
        if: env.AGENT_INSTALL_PAT_CONFIGURED == 'true' && steps.install.outcome == 'success'
        env:
          BODY_FILE: ${{ steps.install.outputs.response_file }}
          MODEL_DISPLAY: ${{ steps.install.outputs.model_display }}
          DISCUSSION_ID: ${{ needs.portal.outputs.discussion_node_id }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REPLY_TO_ID: ${{ needs.portal.outputs.reply_to_id }}
          RESPONSE_KIND: ${{ needs.portal.outputs.response_kind }}
          REVIEW_COMMENT_ID: ${{ needs.portal.outputs.review_comment_id }}
          TARGET_NUMBER: ${{ needs.portal.outputs.target_number }}
        run: node .agent/dist/cli/post-response.js

      - name: Close completed install request issue
        if: >-
          env.AGENT_INSTALL_PAT_CONFIGURED == 'true' &&
          steps.install.outcome == 'success' &&
          steps.post_install_response.outcome == 'success' &&
          needs.portal.outputs.target_kind == 'issue' &&
          steps.install.outputs.install_status == 'published' &&
          steps.install.outputs.install_pr_url != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          INSTALL_PR_URL: ${{ steps.install.outputs.install_pr_url }}
          INSTALL_STATUS: ${{ steps.install.outputs.install_status }}
          TARGET_KIND: ${{ needs.portal.outputs.target_kind }}
          TARGET_NUMBER: ${{ needs.portal.outputs.target_number }}
        run: node .agent/dist/cli/complete-install-request.js

  # --- Route: implementation-like routes (approval request) ---
  approval:
    needs: portal
    if: >-
      vars.AGENT_ENABLED != 'false' &&
      needs.portal.outputs.should_respond == 'true' &&
      needs.portal.outputs.needs_approval == 'true'
    runs-on: ${{ fromJson(inputs.runs_on || vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Setup agent runtime
        id: runtime
        uses: ./.github/actions/setup-agent-runtime

      - name: Prepare approval request
        id: approval
        env:
          INPUT_MENTION: ${{ inputs.agent_handle }}
          ISSUE_BODY: ${{ needs.portal.outputs.issue_body }}
          ISSUE_TITLE: ${{ needs.portal.outputs.issue_title }}
          REQUEST_TEXT: ${{ needs.portal.outputs.body }}
          ROUTE: ${{ needs.portal.outputs.route }}
          SOURCE_KIND: ${{ needs.portal.outputs.source_kind }}
          SUMMARY: ${{ needs.portal.outputs.summary }}
          TARGET_KIND: ${{ needs.portal.outputs.target_kind }}
          TARGET_NUMBER: ${{ needs.portal.outputs.target_number }}
          TARGET_URL: ${{ needs.portal.outputs.target_url }}
          WORKFLOW_FILE: agent-implement.yml
        run: node .agent/dist/cli/prepare-approval.js

      - name: Post approval request
        env:
          BODY_FILE: ${{ steps.approval.outputs.body_file }}
          DISCUSSION_ID: ${{ needs.portal.outputs.discussion_node_id }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RESPONSE_KIND: ${{ needs.portal.outputs.target_kind == 'discussion' && 'discussion_comment' || 'issue_comment' }}
          TARGET_NUMBER: ${{ needs.portal.outputs.target_number }}
        run: node .agent/dist/cli/post-response.js

  # --- Route: implementation-like routes (explicit, no approval gate) ---
  # Runs only when the user explicitly requested the route or applied the
  # matching label. Triaged implementation-like decisions still go through the
  # approval job above.
  implement:
    needs: portal
    if: >-
      vars.AGENT_ENABLED != 'false' &&
      needs.portal.outputs.should_respond == 'true' &&
      (needs.portal.outputs.route == 'implement' || needs.portal.outputs.route == 'create-action') &&
      needs.portal.outputs.needs_approval == 'false'
    runs-on: ${{ fromJson(inputs.runs_on || vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Setup agent runtime
        id: runtime
        uses: ./.github/actions/setup-agent-runtime

      - name: Create implementation issue
        if: needs.portal.outputs.target_kind != 'issue'
        id: create_issue
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          ISSUE_BODY: ${{ needs.portal.outputs.issue_body }}
          ISSUE_TITLE: ${{ needs.portal.outputs.issue_title }}
          SOURCE_KIND: ${{ needs.portal.outputs.source_kind }}
          TARGET_URL: ${{ needs.portal.outputs.target_url }}
        run: node .agent/dist/cli/create-issue.js

      - name: Dispatch agent-implement
        env:
          # APPROVAL_COMMENT_URL is intentionally empty on the explicit path —
          # no approval comment exists, and downstream status comments would
          # otherwise render "Approval: <url>" misleadingly.
          APPROVAL_COMMENT_URL: ""
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.create_issue.outputs.issue_number || needs.portal.outputs.target_number }}
          IMPLEMENTATION_ROUTE: ${{ needs.portal.outputs.route }}
          REQUESTED_BY: ${{ needs.portal.outputs.requested_by }}
          REQUEST_TEXT: ${{ needs.portal.outputs.body }}
          SESSION_FORK_FROM_THREAD_KEY: ${{ github.repository }}:${{ needs.portal.outputs.target_kind }}:${{ needs.portal.outputs.target_number }}:answer:default
          BASE_PR: ${{ needs.portal.outputs.base_pr }}
          AUTOMATION_MODE: ${{ inputs.automation_mode }}
          AUTOMATION_MAX_ROUNDS: ${{ inputs.automation_max_rounds }}
        run: node .agent/dist/cli/dispatch-agent-implement.js

      - name: Prepare link-back body
        if: needs.portal.outputs.target_kind != 'issue'
        id: linkback_body
        env:
          BODY_FILE: ${{ runner.temp }}/implement-linkback.md
          ISSUE_URL: ${{ steps.create_issue.outputs.issue_url }}
        run: |
          set -euo pipefail
          # No workflow-run link: agent-implement.yml is dispatched
          # fire-and-forget, so its run URL isn't known here. The tracking
          # issue is where the final status comment lands.
          printf '%s\n' \
            "Implementing this request — tracking in ${ISSUE_URL}." \
            > "${BODY_FILE}"
          echo "body_file=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - name: Post link-back to original surface
        if: needs.portal.outputs.target_kind != 'issue'
        env:
          BODY_FILE: ${{ steps.linkback_body.outputs.body_file }}
          DISCUSSION_ID: ${{ needs.portal.outputs.discussion_node_id }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REPLY_TO_ID: ${{ needs.portal.outputs.reply_to_id }}
          RESPONSE_KIND: ${{ needs.portal.outputs.response_kind }}
          REVIEW_COMMENT_ID: ${{ needs.portal.outputs.review_comment_id }}
          TARGET_NUMBER: ${{ needs.portal.outputs.target_number }}
        run: node .agent/dist/cli/post-response.js

      - name: React with thumbs up
        if: github.event.action != 'edited'
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          REACTION_SUBJECT_ID: ${{ needs.portal.outputs.reaction_subject_id }}
          REACTION_CONTENT: THUMBS_UP
        run: node .agent/dist/cli/add-reaction.js

  # --- Route: orchestrate ---
  orchestrate:
    needs: portal
    if: >-
      vars.AGENT_ENABLED != 'false' &&
      needs.portal.outputs.should_respond == 'true' &&
      needs.portal.outputs.route == 'orchestrate' &&
      (needs.portal.outputs.target_kind == 'issue' || needs.portal.outputs.target_kind == 'pull_request')
    runs-on: ${{ fromJson(inputs.runs_on || vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Setup agent runtime
        id: runtime
        uses: ./.github/actions/setup-agent-runtime

      - name: Dispatch orchestrator
        env:
          AUTOMATION_CURRENT_ROUND: "1"
          AUTOMATION_MAX_ROUNDS: ${{ inputs.automation_max_rounds }}
          AUTOMATION_MODE: ${{ inputs.automation_mode }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REQUESTED_BY: ${{ needs.portal.outputs.requested_by }}
          REQUEST_TEXT: ${{ needs.portal.outputs.body }}
          SESSION_BUNDLE_MODE: ${{ inputs.session_bundle_mode || vars.AGENT_SESSION_BUNDLE_MODE || 'auto' }}
          SOURCE_ACTION: orchestrate
          SOURCE_CONCLUSION: requested
          AUTHOR_ASSOCIATION: ${{ needs.portal.outputs.association }}
          ACCESS_POLICY: ${{ inputs.access_policy }}
          REPOSITORY_PRIVATE: ${{ github.event.repository.private && 'true' || 'false' }}
          TARGET_KIND: ${{ needs.portal.outputs.target_kind }}
          TARGET_NUMBER: ${{ needs.portal.outputs.target_number }}
        run: node .agent/dist/cli/dispatch-agent-orchestrator.js

  # --- Route: review (dual-agent) ---
  review:
    needs: portal
    if: >-
      vars.AGENT_ENABLED != 'false' &&
      needs.portal.outputs.should_respond == 'true' &&
      needs.portal.outputs.route == 'review' &&
      needs.portal.outputs.target_kind == 'pull_request' &&
      github.event.action != 'edited'
    uses: ./.github/workflows/agent-review.yml
    with:
      pr_number: ${{ needs.portal.outputs.target_number }}
      requested_by: ${{ needs.portal.outputs.requested_by }}
      request_text: ${{ needs.portal.outputs.body }}
      runs_on: ${{ inputs.runs_on }}
      session_bundle_mode: ${{ inputs.session_bundle_mode || vars.AGENT_SESSION_BUNDLE_MODE || 'auto' }}
      automation_mode: ${{ inputs.automation_mode }}
      automation_max_rounds: ${{ inputs.automation_max_rounds }}
    secrets: inherit

  # --- Route: fix-pr ---
  fix-pr:
    needs: portal
    if: >-
      vars.AGENT_ENABLED != 'false' &&
      needs.portal.outputs.should_respond == 'true' &&
      needs.portal.outputs.route == 'fix-pr' &&
      needs.portal.outputs.target_kind == 'pull_request' &&
      github.event.action != 'edited'
    uses: ./.github/workflows/agent-fix-pr.yml
    with:
      runs_on: ${{ inputs.runs_on }}
      pr_number: ${{ needs.portal.outputs.target_number }}
      requested_by: ${{ needs.portal.outputs.requested_by }}
      request_text: ${{ needs.portal.outputs.body }}
      request_comment_id: ${{ needs.portal.outputs.source_comment_id }}
      request_comment_url: ${{ needs.portal.outputs.source_comment_url }}
      request_source_kind: ${{ needs.portal.outputs.source_kind }}
      session_bundle_mode: ${{ inputs.session_bundle_mode || vars.AGENT_SESSION_BUNDLE_MODE || 'auto' }}
      automation_mode: ${{ inputs.automation_mode }}
      automation_max_rounds: ${{ inputs.automation_max_rounds }}
    secrets: inherit
