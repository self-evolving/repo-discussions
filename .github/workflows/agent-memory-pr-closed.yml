name: Agent / Memory / Record PR Closure

on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to record in memory"
        required: true
      memory_ref:
        description: "Memory branch to update"
        required: false
        default: agent/memory

permissions:
  contents: write
  pull-requests: read
  id-token: write # required for GitHub Actions OIDC broker exchange

concurrency:
  group: agent-memory-${{ github.repository }}-pr-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  record:
    # Fork safety: run automatically only for same-repo PRs or merged fork PRs
    # (a deliberate post-merge trust trade-off). Merged fork PR metadata can
    # still be attacker-controlled and edited after merge; v3 accepts that risk
    # for memory curation. Skip closed-without-merge fork PRs where attacker-
    # controlled title/body would reach the LLM without merge review.
    if: >-
      vars.AGENT_ENABLED != 'false' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event.pull_request.head.repo.full_name == github.repository ||
        github.event.pull_request.merged == true
      )
    runs-on: ${{ fromJson(vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    env:
      MEMORY_REF: ${{ inputs.memory_ref || vars.AGENT_MEMORY_REF || 'agent/memory' }}
      PR_NUMBER: ${{ inputs.pr_number || github.event.pull_request.number }}
      PR_URL: ${{ github.event.pull_request.html_url || format('{0}/{1}/pull/{2}', github.server_url, github.repository, inputs.pr_number) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ github.token }}

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Resolve memory PR closure provider
        id: provider
        uses: ./.github/actions/resolve-agent-provider
        with:
          route: memory-pr-closed
          default_provider: ${{ vars.AGENT_DEFAULT_PROVIDER || 'auto' }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model_policy: ${{ vars.AGENT_MODEL_POLICY || '' }}

      - name: Setup agent runtime
        uses: ./.github/actions/setup-agent-runtime
        with:
          install_codex: ${{ steps.provider.outputs.install_codex }}
          install_claude: ${{ steps.provider.outputs.install_claude }}

      - name: Resolve task timeout
        id: task_timeout
        env:
          AGENT_TASK_TIMEOUT_POLICY: ${{ vars.AGENT_TASK_TIMEOUT_POLICY || '' }}
          ROUTE: answer
        run: node .agent/dist/cli/resolve-task-timeout.js

      - name: Record PR closure into memory
        id: summarize
        timeout-minutes: ${{ fromJson(steps.task_timeout.outputs.minutes || '30') }}
        uses: ./.github/actions/run-agent-task
        with:
          agent: ${{ steps.provider.outputs.provider }}
          github_token: ${{ steps.auth.outputs.token }}
          secondary_github_token: ${{ secrets.AGENT_SECONDARY_GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: ${{ steps.provider.outputs.model }}
          display_model: ${{ vars.AGENT_DISPLAY_MODEL || '' }}
          permission_mode: approve-all
          prompt: memory-pr-closed
          route: answer
          memory_mode_override: 'enabled'
          memory_ref: ${{ env.MEMORY_REF }}
          memory_policy: ${{ vars.AGENT_MEMORY_POLICY || '' }}
          session_policy: none
          request_text: >-
            Record this closed pull request in repository memory. One daily bullet, plus durable memory updates only if warranted.
          requested_by: ${{ github.actor }}
          source_kind: pull_request
          target_kind: pull_request
          target_number: ${{ env.PR_NUMBER }}
          target_url: ${{ env.PR_URL }}
          reasoning_effort: ${{ steps.provider.outputs.reasoning_effort || 'medium' }}
          workflow: agent-memory-pr-closed.yml
