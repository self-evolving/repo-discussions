name: Agent / Rubrics / Initialization

on:
  workflow_dispatch:
    inputs:
      rubrics_ref:
        description: "Rubrics branch to create on first run"
        required: false
        default: agent/rubrics
      initialization_context:
        description: "Optional context, links, PRs, issues, or preferences for initial rubric seeding"
        required: false
        default: ""

permissions:
  contents: write
  discussions: read
  issues: read
  pull-requests: read
  id-token: write # required for GitHub Actions OIDC broker exchange

concurrency:
  group: agent-rubrics-${{ github.repository }}-initialization
  cancel-in-progress: false

jobs:
  initialize:
    if: vars.AGENT_ENABLED != 'false'
    runs-on: ${{ fromJson(vars.AGENT_RUNS_ON || '["ubuntu-latest"]') }}
    env:
      RUBRICS_REF: ${{ inputs.rubrics_ref || vars.AGENT_RUBRICS_REF || 'agent/rubrics' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ github.token }}

      - name: Resolve GitHub auth
        id: auth
        uses: ./.github/actions/resolve-github-auth
        with:
          app_id: ${{ secrets.AGENT_APP_ID }}
          app_private_key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
          pat: ${{ secrets.AGENT_PAT }}
          fallback_token: ${{ github.token }}

      - name: Resolve rubrics initialization provider
        id: provider
        uses: ./.github/actions/resolve-agent-provider
        with:
          route: rubrics-initialization
          default_provider: ${{ vars.AGENT_DEFAULT_PROVIDER || 'auto' }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model_policy: ${{ vars.AGENT_MODEL_POLICY || '' }}

      - name: Setup agent runtime
        uses: ./.github/actions/setup-agent-runtime
        with:
          install_codex: ${{ steps.provider.outputs.install_codex }}
          install_claude: ${{ steps.provider.outputs.install_claude }}

      - name: Reject existing rubrics branch
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          refs_file="$(mktemp)"
          trap 'rm -f "$refs_file"' EXIT
          gh api "repos/${GITHUB_REPOSITORY}/git/matching-refs/heads/${RUBRICS_REF}" --jq '.[].ref' >"$refs_file"
          exact_ref="refs/heads/${RUBRICS_REF}"
          if grep -Fxq "$exact_ref" "$refs_file"; then
            echo "Rubrics branch ${GITHUB_REPOSITORY}@${RUBRICS_REF} already exists. Initialization is first-run only; use Agent / Rubrics / Update for later rubric learning." >&2
            exit 1
          fi

      - name: Resolve task timeout
        id: task_timeout
        env:
          AGENT_TASK_TIMEOUT_POLICY: ${{ vars.AGENT_TASK_TIMEOUT_POLICY || '' }}
          ROUTE: rubrics-initialization
        run: node .agent/dist/cli/resolve-task-timeout.js

      - name: Initialize and seed rubrics
        timeout-minutes: ${{ fromJson(steps.task_timeout.outputs.minutes || '30') }}
        uses: ./.github/actions/run-agent-task
        with:
          agent: ${{ steps.provider.outputs.provider }}
          github_token: ${{ steps.auth.outputs.token }}
          secondary_github_token: ${{ secrets.AGENT_SECONDARY_GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: ${{ steps.provider.outputs.model }}
          display_model: ${{ vars.AGENT_DISPLAY_MODEL || '' }}
          permission_mode: approve-all
          prompt: rubrics-initialization
          route: rubrics-initialization
          lane: initialization
          memory_mode_override: 'read-only'
          memory_ref: ${{ vars.AGENT_MEMORY_REF || 'agent/memory' }}
          memory_policy: ${{ vars.AGENT_MEMORY_POLICY || '' }}
          rubrics_mode_override: 'enabled'
          rubrics_ref: ${{ env.RUBRICS_REF }}
          rubrics_policy: ${{ vars.AGENT_RUBRICS_POLICY || '' }}
          rubrics_limit: ${{ vars.AGENT_RUBRICS_LIMIT || '10' }}
          session_bundle_mode: ${{ vars.AGENT_SESSION_BUNDLE_MODE || 'auto' }}
          session_policy: none
          request_text: |
            Initialize user/team rubrics for this repository.

            Supplied initialization context:
            ${{ inputs.initialization_context }}
          requested_by: ${{ github.repository_owner }}
          source_kind: workflow_dispatch
          target_kind: repository
          target_number: '0'
          target_url: ${{ github.server_url }}/${{ github.repository }}
          reasoning_effort: ${{ steps.provider.outputs.reasoning_effort || 'high' }}
          workflow: agent-rubrics-initialization.yml
