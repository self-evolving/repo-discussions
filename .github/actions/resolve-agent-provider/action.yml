name: Resolve Agent Provider
description: Resolve the acpx agent provider from route overrides, defaults, and configured secrets.

inputs:
  route:
    description: "Route name used in diagnostics"
    required: true
  route_provider:
    description: "Optional inline route-specific provider override"
    required: false
    default: ""
  default_provider:
    description: "Default provider: auto, codex, or claude"
    required: false
    default: auto
  openai_api_key:
    description: "OpenAI API key for Codex readiness detection"
    required: false
    default: ""
  claude_oauth_token:
    description: "Claude Code OAuth token for Claude readiness detection"
    required: false
    default: ""
  anthropic_api_key:
    description: "Anthropic API key for Claude readiness detection"
    required: false
    default: ""
  required:
    description: "Whether unresolved auto provider detection should fail the step"
    required: false
    default: "true"
  model_policy:
    description: "Optional AGENT_MODEL_POLICY JSON for provider, model, and reasoning effort settings"
    required: false
    default: ""

outputs:
  provider:
    description: "Resolved provider"
    value: ${{ steps.resolve.outputs.provider }}
  reason:
    description: "Human-readable reason for the selected provider"
    value: ${{ steps.resolve.outputs.reason }}
  install_codex:
    description: "Whether setup-agent-runtime should install Codex"
    value: ${{ steps.resolve.outputs.install_codex }}
  install_claude:
    description: "Whether setup-agent-runtime should install Claude"
    value: ${{ steps.resolve.outputs.install_claude }}
  model:
    description: "Resolved model id to pass to acpx, if configured"
    value: ${{ steps.resolve.outputs.model }}
  reasoning_effort:
    description: "Resolved reasoning effort override, if configured"
    value: ${{ steps.resolve.outputs.reasoning_effort }}

runs:
  using: composite
  steps:
    - name: Resolve provider
      id: resolve
      shell: bash
      env:
        ROUTE: ${{ inputs.route }}
        ROUTE_PROVIDER: ${{ inputs.route_provider }}
        DEFAULT_PROVIDER: ${{ inputs.default_provider }}
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_oauth_token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        REQUIRED: ${{ inputs.required }}
        AGENT_MODEL_POLICY: ${{ inputs.model_policy }}
      run: |
        # Keep this on plain Node/CommonJS because provider resolution runs
        # before setup-agent-runtime builds .agent/dist or installs packages.
        node "${GITHUB_ACTION_PATH}/resolve-provider.js"
